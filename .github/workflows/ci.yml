name: Monorepo CI/CD

on:
  push:
    paths:
      - 'level-3-orange-belt/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'level-3-orange-belt/**'

jobs:


  test-frontend:
    name: Build and Test Frontend (L3)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./level-3-orange-belt/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: level-3-orange-belt/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Tests
        run: npm test --if-present

      - name: Build Project
        run: npm run build
